name: Deploy Togglemaster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply Terraform"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type the environment name to confirm"
        required: true

jobs:

  #Validação para evitar deploy acidental
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]; then
            echo "Confirmation '${{ github.event.inputs.confirm }}' does not match environment '${{ github.event.inputs.environment }}'."
            exit 1
          fi

  # 1. Aplicar Infra
  Terraform:
    needs: validate
    uses: Togglemaster/Terraform/.github/workflows/terraform_apply.yaml@main
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}

  # 2. Sincronizar Secrets
  Secrets:
    needs: Terraform
    uses: Togglemaster/Terraform/.github/workflows/secrets.yaml@main
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}

  # 3. Deploy Observability (Datadog)
  Observability:
    needs: Secrets
    uses: Togglemaster/Observability/.github/workflows/observability.yaml@main
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}

  # 4. CI dos Microserviços (Rodam em paralelo)
  CI_Auth:
    needs: Observability
    uses: Togglemaster/Auth-Service/.github/workflows/auth.yaml@main
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}

  CI_Flag:
    needs: Observability
    uses: Togglemaster/Flag-Service/.github/workflows/flag.yaml@main
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}

  CI_Targeting:
    needs: Observability
    uses: Togglemaster/Targeting-Service/.github/workflows/targeting.yaml@main
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}

  CI_Evaluation:
    needs: Observability
    uses: Togglemaster/Evaluation-Service/.github/workflows/evaluation.yaml@main
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}

  CI_Analytics:
    needs: Observability
    uses: Togglemaster/Analytics-Service/.github/workflows/analytics.yaml@main
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}

  # 5. Deploy Final com ArgoCD e Helm
  Deploy_Helm:
    needs: [CI_Auth, CI_Flag, CI_Targeting, CI_Evaluation, CI_Analytics] # Espera os CIs terminarem
    uses: Togglemaster/togglemaster/.github/workflows/helm_deploy.yaml@main
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}